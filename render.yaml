services:
  - type: web
    name: smart-pch-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    disk:
      name: smart-pch-db
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
